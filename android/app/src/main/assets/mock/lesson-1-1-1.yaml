id: lesson-1-1-1
title: "Lesson 1: Excuse me!"
book_id: book-1
unit_id: unit-1-1

grammar_points:
  - name: 一般疑问句
    explanation: 以动词 be 开头的疑问句，用于询问某事是否属实。回答用 Yes/No。
    examples:
      - "Is this your handbag? — Yes, it is."
      - "Is this your pen? — No, it isn't."

  - name: 形容词性物主代词
    explanation: your 表示"你的"，放在名词前面修饰名词。
    examples:
      - your handbag
      - your pen
      - your book

new_vocabulary:
  - word: excuse
    phonetic: "/ɪkˈskjuːz/"
    definition_cn: 原谅
    part_of_speech: verb
    example: "Excuse me, is this your pen?"

  - word: handbag
    phonetic: "/ˈhændbæɡ/"
    definition_cn: 手提包
    part_of_speech: noun
    example: "Is this your handbag?"

  - word: pardon
    phonetic: "/ˈpɑːrdn/"
    definition_cn: 原谅，再说一遍
    part_of_speech: noun/verb
    example: "I beg your pardon?"

  - word: thank
    phonetic: "/θæŋk/"
    definition_cn: 感谢
    part_of_speech: verb
    example: "Thank you very much."

review_vocabulary:
  - hello
  - goodbye
  - please

passage:
  title: "Excuse me!"
  text: |
    MAN: Excuse me!
    WOMAN: Yes?
    MAN: Is this your handbag?
    WOMAN: Pardon?
    MAN: Is this your handbag?
    WOMAN: Yes, it is. Thank you very much.
  word_count: 25
  images:
    - url: "https://picsum.photos/400/300?random=1"
      alt: "A man tapping a woman on the shoulder to get her attention"
    - url: "https://picsum.photos/400/300?random=2"
      alt: "A handbag on a table"

fill_blanks:
  template: |
    Excuse ___!
    
    ___?
    
    Is this your ___?
    
    ___?
    
    Is this your handbag?
    
    Yes, ___ is.
    
    Thank you very ___.
  gaps:
    - gap_index: 0
      word: me
      initial: m
      pos: pronoun
      meaning_cn: 我（宾格）

    - gap_index: 1
      word: "Yes"
      initial: Y
      pos: interjection
      meaning_cn: 是的

    - gap_index: 2
      word: handbag
      initial: h
      pos: noun
      meaning_cn: 手提包

    - gap_index: 3
      word: Pardon
      initial: P
      pos: noun
      meaning_cn: 原谅，再说一遍

    - gap_index: 4
      word: it
      initial: i
      pos: pronoun
      meaning_cn: 它

    - gap_index: 5
      word: much
      initial: m
      pos: adverb
      meaning_cn: 非常

vocabulary_exercises:
