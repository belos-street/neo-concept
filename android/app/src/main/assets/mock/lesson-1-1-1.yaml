listening:
  questions:
    - type: multiple_choice
      audio_segment: "Excuse me!"
      question: What does the speaker say at the beginning?
      options: [Excuse me, I'm sorry, Thank you, Pardon me]
      answer: 0

    - type: multiple_choice
      audio_segment: "Is this your handbag?"
      question: What is the speaker asking about?
      options: [A pen, A handbag, A book, A bag]
      answer: 1

reading:
  questions:
    - type: multiple_choice
      question: What does the person ask about?
      options: [A pen, A book, A handbag, A key]
      answer: 2
      evidence: "Is this your handbag?"

    - type: multiple_choice
      question: Does the handbag belong to the person asked?
      options: ["Yes, it does", "No, it doesn't", Maybe, "We don't know"]
      answer: 0
      evidence: "Yes, it is."

